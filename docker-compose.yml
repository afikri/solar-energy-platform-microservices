version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: solar_postgres
    restart: always
    environment:
      POSTGRES_USER: solar
      POSTGRES_PASSWORD: solarpass
      POSTGRES_DB: solar_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: solar_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: solar_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  mongo_data: